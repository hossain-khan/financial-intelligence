name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify TypeScript toolchain roles
        run: pnpm typescript:check

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Check generated schema types
        run: pnpm schema:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build production PWA
        run: pnpm build

      - name: Check production security headers
        run: pnpm security:headers:check -- apps/web/dist/_headers

      - name: Audit high-severity dependency vulnerabilities
        run: pnpm audit --audit-level high

      - name: Generate dependency inventory
        run: pnpm list --prod --recursive --json > dependency-inventory.json

      - name: Upload dependency inventory
        uses: actions/upload-artifact@v7
        with:
          name: dependency-inventory
          path: dependency-inventory.json
          retention-days: 14

  browser:
    name: Browser (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run production browser gate
        run: pnpm exec playwright test --project=${{ matrix.browser }}

      - name: Upload browser report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
