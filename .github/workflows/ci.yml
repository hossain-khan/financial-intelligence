name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify TypeScript toolchain roles
        run: pnpm typescript:check

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Check generated schema types
        run: pnpm schema:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test unit and integration suites with coverage gate
        run: pnpm test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hossain-khan/financial-intelligence

      - name: Build production PWA
        run: pnpm build

      - name: Check production security headers
        run: pnpm security:headers:check -- apps/web/dist/_headers

      - name: Validate Cloudflare Workers asset bundle
        run: pnpm exec wrangler deploy --dry-run --outdir .wrangler/dry-run

      - name: Audit high-severity dependency vulnerabilities
        run: pnpm audit --audit-level high

      - name: Generate dependency inventory
        run: pnpm list --prod --recursive --json > dependency-inventory.json

      - name: Upload dependency inventory
        uses: actions/upload-artifact@v7
        with:
          name: dependency-inventory
          path: dependency-inventory.json
          retention-days: 14

  browser:
    name: Browser (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run production browser gate
        run: pnpm exec playwright test --project=${{ matrix.browser }}

      - name: Upload browser report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  performance:
    # Informational qualification smoke: measures user-visible budgets on a synthetic workload and
    # uploads a bounded, privacy-checked result artifact. It never fails the build while variance is
    # being characterised; promotion to a blocking gate is a documented future review.
    name: Performance smoke (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run performance smoke (1k rows)
        env:
          PERF_ROWS: "1000"
          PERF_ITERATIONS: "5"
        run: pnpm exec playwright test --project=perf

      - name: Validate perf result artifact
        if: always()
        run: node scripts/check-perf-result.mjs perf-results/qualification-1000.json

      - name: Upload perf result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-results
          path: perf-results/
          retention-days: 14
